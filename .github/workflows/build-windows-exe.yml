name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify bundled FFmpeg (libomt-aware) in bin/
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "bin\ffmpeg.exe",
            "bin\ffplay.exe",
            "bin\libomt.dll",
            "bin\libomtnet.dll",
            "bin\libvmx.dll"
          )
          $missing = @()
          foreach ($p in $required) {
            if (-not (Test-Path $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "::error::Missing required bundled binaries:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host "All required FFmpeg/OMT binaries are present in bin/."
          Get-ChildItem bin\ | Format-Table Name, Length

      - name: Build EXE (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm .\srt_multiview.spec

      - name: Delete existing Nightly release/tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Delete existing release by tag (ignore if missing)
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'nightly' });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id });
            } catch (e) {
              core.info('No existing nightly release to delete');
            }

            // Delete tag ref (ignore if missing)
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/nightly' });
            } catch (e) {
              core.info('No existing nightly tag to delete');
            }

      - name: Publish Nightly GitHub Release (on main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: nightly
          name: Nightly
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: dist/SRT-MultiView.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRT-MultiView-windows
          path: |
            dist/SRT-MultiView.exe
            build/**/warn-*.txt
            build/**/xref-*.html
          if-no-files-found: error
